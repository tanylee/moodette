name: Scrape Temu -> products.json

on:
  schedule:
    - cron: '0 */6 * * *'          # каждые 6 часов
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      # укажи свой CSV с Google Sheets; если уже есть секрет — можно удалить эту строку
      SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
      # можно переопределить через Secrets
      MAX_ROWS: ${{ secrets.MAX_ROWS ||  '120' }}
      CONCURRENCY: ${{ secrets.CONCURRENCY || '4' }}
      # Домен для RSS (например, Netlify)
      SITE_URL: ${{ secrets.SITE_URL || 'https://capable-douhua-1a4c98.netlify.app' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Playwright нужен для переходов по редиректу Temu
      - name: Install deps (playwright)
        run: |
          npm -v || true
          npx --yes playwright install --with-deps chromium

      - name: Run scraper
        run: node scraper/index.js
        env:
          SHEET_CSV_URL: ${{ env.SHEET_CSV_URL }}
          MAX_ROWS: ${{ env.MAX_ROWS }}
          CONCURRENCY: ${{ env.CONCURRENCY }}

      - name: Show first 10 lines of products.json
        run: |
          echo "------ data/products.json (head) ------"
          head -n 10 data/products.json || true
          echo "---------------------------------------"

      # Собираем RSS из products.json
      - name: Build RSS
        run: |
          npm ci || true
          SITE_URL="${{ env.SITE_URL }}" npm run build:rss

      # Коммитим изменения (products.json и feed.xml)
      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products.json feed.xml
          if ! git diff --cached --quiet; then
            git commit -m "Update products.json & feed.xml (auto)"
            git pull --rebase
            git push
          else
            echo "No changes to commit"
          fi

      # Дергаем Netlify билд-хук — ТВОЙ РЕАЛЬНЫЙ (ты его прислал)
      - name: Trigger Netlify build
        if: always()
        run: curl -X POST -d '{}' "https://api.netlify.com/build_hooks/68bd26bfa107607248f27a64"

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - name: Done
        run: echo "Deploy will be handled by Netlify build hook."
