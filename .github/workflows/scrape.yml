name: Scrape Temu -> products.json

on:
  schedule:
    - cron: '0 */6 * * *'      # каждые 6 часов
  workflow_dispatch:

permissions:
  contents: write              # нужно для git commit/push

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Если используешь секреты — добавь SHEET_CSV_URL в Settings → Secrets → Actions
      SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
      MAX_ROWS:       ${{ secrets.MAX_ROWS || '120' }}
      CONCURRENCY:    ${{ secrets.CONCURRENCY || '4' }}
      SITE_URL:       ${{ secrets.SITE_URL || 'https://capable-douhua-1a4c98.netlify.app' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Playwright для аккуратных переходов/редиректов Temu
      - name: Install Playwright Chromium
        run: |
          npx --yes playwright install --with-deps chromium

      - name: Ensure data folder & empty JSON
        run: |
          mkdir -p data
          [ -f data/products.json ] || echo "[]" > data/products.json

      - name: Run scraper
        run: node scraper/index.js
        env:
          SHEET_CSV_URL: ${{ env.SHEET_CSV_URL }}
          MAX_ROWS:      ${{ env.MAX_ROWS }}
          CONCURRENCY:   ${{ env.CONCURRENCY }}

      - name: Debug CSV / JSON head
        run: |
          echo "----- products.json (first 10 lines) -----"
          head -n 10 data/products.json || true
          echo "-----------------------------------------"

      # RSS из products.json без npm — напрямую через node (esm .mjs)
      - name: Build RSS
        run: |
          SITE_URL="${{ env.SITE_URL }}" node scripts/build-rss.mjs

      - name: Commit updated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products.json feed.xml
          if ! git diff --cached --quiet; then
            git commit -m "Update products.json & feed.xml (auto)"
            # на случай гонки коммитов
            git pull --rebase
            git push
          else
            echo "No changes to commit"
          fi

      # ТВОЙ реальный Netlify build hook (из сообщения)
      - name: Trigger Netlify build
        if: always()
        run: curl -X POST -d '{}' "https://api.netlify.com/build_hooks/68bd26bfa107607248f27a64"

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - name: Netlify will deploy
        run: echo "Deploy handled by Netlify build hook."
