name: Scrape Temu -> products.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    paths:
      - "scraper/**"
      - ".github/workflows/scrape.yml"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    concurrency:
      group: moodette-scrape
      cancel-in-progress: true
    env:
      SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
      MAX_ROWS: "12"        # можешь поднять до 20–40
      CONCURRENCY: "4"      # 3–5 безопасно

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: scraper
        run: |
          npm install
          npm run install:browsers

      - name: Debug CSV (first 10 lines)
        run: |
          echo "URL=$SHEET_CSV_URL"
          curl -I -L "$SHEET_CSV_URL" || true
          echo "----- HEAD -----"
          curl -L "$SHEET_CSV_URL" | sed -n '1,10p' || true

      - name: Run scraper
        working-directory: scraper
        run: npm run scrape

      - name: Commit products.json (hard-safe)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          test -f data/products.json || { echo "data/products.json not found"; exit 0; }
          if git diff --quiet -- data/products.json; then
            echo "No changes in data/products.json — skip commit"
            exit 0
          fi

          TMPFILE="$(mktemp)"
          cp -f data/products.json "$TMPFILE"

          git fetch origin main
          git checkout main
          git reset --hard origin/main
          mv -f "$TMPFILE" data/products.json
          rm -f "$TMPFILE"

          git add data/products.json
          git commit -m "Update products.json from Sheet (auto)"

          n=0
          until [ $n -ge 3 ]
          do
            if git push origin HEAD:main; then
              echo "Pushed successfully"
              break
            fi
            echo "Push rejected, retrying... ($((n+1))/3)"
            git fetch origin main
            git reset --hard origin/main
            git add data/products.json
            if git diff --quiet --cached; then
              echo "Remote already has same content — skipping commit"
              exit 0
            fi
            git commit --amend --no-edit || true
            n=$((n+1))
            sleep 2
          done
          if [ $n -ge 3 ]; then
            echo "ERROR: push failed after retries" >&2
            exit 1
          fi

      # Включи, если используешь Netlify build hook (добавь секрет NETLIFY_HOOK_URL)
      # - name: Trigger Netlify build
      #   if: always()
      #   run: curl -X POST -d '{}' ${{ secrets.NETLIFY_HOOK_URL }}

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
