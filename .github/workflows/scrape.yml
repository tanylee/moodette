name: Scrape Temu -> products.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    paths:
      - "scraper/**"
      - ".github/workflows/scrape.yml"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # нужно для git push из job
    permissions:
      contents: write

    # не даём двум рансам работать параллельно и конфликтовать
    concurrency:
      group: moodette-scrape
      cancel-in-progress: true

    env:
      SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
      MAX_ROWS: "12"         # можно поднять после проверки
      CONCURRENCY: "4"       # 3–5 безопасно

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # нужен полный history для rebase

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: scraper
        run: |
          npm install
          npm run install:browsers

      - name: Debug CSV (first 10 lines)
        run: |
          echo "URL=$SHEET_CSV_URL"
          curl -I -L "$SHEET_CSV_URL" || true
          echo "----- HEAD -----"
          curl -L "$SHEET_CSV_URL" | sed -n '1,10p' || true

      - name: Run scraper
        working-directory: scraper
        run: npm run scrape

      - name: Commit products.json
        shell: bash
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main
          # подтягиваем удалённые изменения и кладём наш коммит поверх
          git pull --rebase --autostash origin main

          if ! git diff --quiet -- data/products.json; then
            git add data/products.json
            git commit -m "Update products.json from Sheet (auto)"
            git push origin HEAD:main
          else
            echo "No changes in data/products.json — skip commit"
          fi

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
