<!DOCTYPE html>
<html lang="en">
<head>

  <title>Moodette</title>
  <link rel="stylesheet" href="assets/styles.css" />

<body>
  <header>
    <h1>Moodette</h1>
    <p>Curated Temu finds for your Pinterest boards</p>
  </header>

  <template id="product-template">
