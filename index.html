<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Moodette — Pinterest Finds</title>

  <link rel="preconnect" href="https://temu.to">
  <link rel="dns-prefetch" href="https://temu.to">
  <link rel="preconnect" href="https://www.temu.com">
  <link rel="dns-prefetch" href="https://www.temu.com">

  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="wrap">
    <h1>Moodette</h1>
    <p class="sub">Curated Temu finds for your Pinterest boards</p>
  </header>

  <main class="wrap">
    <div id="grid" class="grid"></div>

    <!-- Шаблон карточки -->
    <template id="card-tpl">
      <article class="card">
        <div class="thumb"></div>
        <div class="body">
          <h3 class="title"></h3>
          <div class="meta">
            <span class="pill cat"></span>
          </div>
          <a class="btn-go" target="_blank" rel="nofollow noopener sponsored">Go to Temu</a>
        </div>
      </article>
    </template>
  </main>

  <script type="module">
    async function getData() {
      const res = await fetch('data/products.json', { cache: 'no-store' });
      if (!res.ok) return [];
      return res.json();
    }

    const grid = document.getElementById('grid');
    const tpl  = document.getElementById('card-tpl');

    function renderItem(item) {
      const el = tpl.content.cloneNode(true);
      const card = el.querySelector('.card');
      const thumb = el.querySelector('.thumb');
      const title = el.querySelector('.title');
      const cat   = el.querySelector('.cat');
      const btn   = el.querySelector('.btn-go');

      if (item.image) {
        const img = new Image();
        img.src = item.image;
        img.alt = item.title || item.id || 'Temu product';
        img.loading = 'lazy';
        thumb.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.style.height = '220px';
        ph.style.display = 'flex';
        ph.style.alignItems = 'center';
        ph.style.justifyContent = 'center';
        ph.style.background = '#f3f3f3';
        ph.style.color = '#8b8b8b';
        ph.style.fontWeight = '600';
        ph.textContent = item.title || item.id || 'Temu product';
        thumb.appendChild(ph);
      }

      title.textContent = item.title || `Temu link — ${item.id}`;
      cat.textContent   = (item.category || 'mixed').replace('-', ' ');
      btn.href = `/go.html?id=${encodeURIComponent(item.id)}`;

      card.addEventListener('click', (e) => {
        if (!e.target.closest('a')) window.open(btn.href, '_blank', 'noopener');
      });

      return el;
    }

    (async () => {
      const items = await getData();
      items.forEach(it => grid.appendChild(renderItem(it)));
    })();
  </script>
</body>
</html>
