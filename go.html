<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting to Temu…</title>

  <!-- Plausible -->
  <script defer data-domain="capable-douhua-1a4c98.netlify.app" src="https://plausible.io/js/script.js"></script>

  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;margin:0;display:grid;place-items:center;min-height:100dvh;background:#faf8f7;color:#222}
    .box{max-width:560px;padding:24px;border-radius:16px;background:#fff;box-shadow:0 12px 28px rgba(0,0,0,.08);text-align:center}
    .muted{color:#8b8b8b}
  </style>
</head>
<body>
  <div class="box">
    <h1>Redirecting to Temu…</h1>
    <p class="muted">One moment please.</p>
  </div>

  <script>
    const q = new URL(location.href).searchParams;
    const urlParam = q.get('url');
    const idParam  = q.get('id');

    // поддержка обоих вариантов: ?url=... (предпочтительно) и ?id=...
    const target = urlParam
      ? urlParam
      : (idParam ? `https://temu.to/k/${encodeURIComponent(idParam)}` : 'https://temu.to');

    const prodId = idParam || ''; // для props

    function redirect(){ location.replace(target); }

    // отправим событие и затем редирект
    try {
      if (window.plausible) {
        plausible('temu_click', { props: { id: prodId, from: 'go.html' }, callback: redirect });
        setTimeout(redirect, 700); // фоллбек
      } else {
        setTimeout(redirect, 120);
      }
    } catch(e){
      setTimeout(redirect, 120);
    }
  </script>
</body>
</html>
